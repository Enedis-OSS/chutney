<h4 class="m-0">
    {{ 'tokens.creation.title' | translate }}
</h4>

<form [formGroup]="tokenForm" (ngSubmit)="saveToken()" autocomplete="off"
      class="tokens-form-group">
    <label for="note" class="form-label">
        {{ 'tokens.creation.form.note.label' | translate }}
    </label>
    <input type="text" id="note" class="form-control" formControlName="note">
    @if (submitted && this.tokenForm.hasError('required', 'note')) {
        <div class="error-message">
            {{ 'tokens.creation.form.note.required' | translate }}
        </div>
    }

    <label for="expirationDate" class="form-label">
        {{ 'tokens.creation.form.expirationDate' | translate }}
    </label>
    <div class="input-group">
        <input id="expirationDate" class="form-control" placeholder="yyyy-mm-dd"
                  name="expirationDate" formControlName="expirationDate" ngbDatepicker #d="ngbDatepicker">
        <button class="btn btn-primary bi bi-calendar-event" (click)="d.toggle()" type="button"></button>
    </div>

    <button type="submit" [disabled]="(submitted && tokenForm.invalid)" class="btn btn-primary m-2">
        <span>{{ 'global.actions.record' | translate }}</span>
    </button>
 </form>
