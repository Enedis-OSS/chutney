@if (display) {
    <p class="mb-2">
        <strong>{{ 'tokens.display.token' | translate }}</strong>
    </p>
    <p class="p-2 border rounded">
        {{ token}}
    </p>
    <p class="text-muted mt-2">
        {{ 'tokens.display.keepIt' | translate }}
    </p>
} @else {
    <p class="text-muted">
        {{ 'tokens.display.nothing' | translate }}
    </p>
}
