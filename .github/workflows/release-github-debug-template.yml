name: "Debug Release on Github"

on:
  workflow_call:
    inputs:
      publish-to-github-maven-registry:
        default: true
        type: boolean
        description: "Skip publish-to-github-maven-registry if false"
jobs:
  upload-chutney-server-assets-to-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Get chutney-artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: chutney-artifacts
          path: artifacts

      - name: Read artifacts
        id: read-artifacts
        run: |
          pwd
          ls
          cd artifacts
          ls
          cd chutney-server
          ls

  upload-plugin-assets-to-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Get plugin-artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: plugin-artifacts
          path: artifacts

      - name: Read artifacts
        id: read-artifacts
        run: |
          pwd
          ls
          cd artifacts
          ls
    
  

